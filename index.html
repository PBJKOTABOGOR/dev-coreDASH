<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPPBJ - Dashboard PBJ Kota Bogor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-block">
        <div class="brand-left secret-trigger" id="secretTrigger" title="Klik 5x untuk akses internal">
           <div class="brand-logo brand-logo-img">
  <img src="assets/logo-sippbj.png" alt="SIPPBJ">
</div>

          <div class="brand-text">
            <h1>SIPPBJ</h1>
            <p>Dashboard Monitoring</p>
          </div>
        </div>

        <button
          class="sidebar-toggle-button"
          id="sidebarToggleButton"
          type="button"
          aria-label="Toggle sidebar"
        >
          ☰
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">MENU UTAMA</div>

        <button class="nav-link active" type="button" data-page="dashboard">
          <span class="nav-left">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Dashboard</span>
          </span>
        </button>

        <div class="nav-group open" data-group="itkp">
          <button class="nav-link nav-toggle" type="button" data-toggle-group="itkp">
            <span class="nav-left">
              <span class="nav-icon">📊</span>
              <span class="nav-text">ITKP</span>
            </span>
            <span class="nav-caret">⌄</span>
          </button>

          <div class="submenu">
            <button class="submenu-link" type="button" data-page="monitoring-sirup">SiRUP</button>
            <button class="submenu-link" type="button" data-page="monitoring-ekatalog">eKatalog</button>
            <button class="submenu-link" type="button" data-page="monitoring-etendering">eTendering</button>
            <button class="submenu-link" type="button" data-page="monitoring-ekontrak">eKontrak</button>
            <button class="submenu-link" type="button" data-page="monitoring-nontender">Non eTendering / Non ePurchasing</button>
          </div>
        </div>

        <button class="nav-link" type="button" data-page="rapor-pbj">
          <span class="nav-left">
            <span class="nav-icon">📝</span>
            <span class="nav-text">Rapor PBJ</span>
          </span>
        </button>

        <div class="nav-group" data-group="realisasi">
          <button class="nav-link nav-toggle" type="button" data-toggle-group="realisasi">
            <span class="nav-left">
              <span class="nav-icon">📦</span>
              <span class="nav-text">Realisasi Paket</span>
            </span>
            <span class="nav-caret">⌄</span>
          </button>

          <div class="submenu">
            <button class="submenu-link" type="button" data-page="monitoring-perencanaan">Monitoring Realisasi</button>
            <button class="submenu-link" type="button" data-page="monitoring-konsolidasi">Konsolidasi</button>
          </div>
        </div>

        <div class="nav-group" data-group="simulasi">
          <button class="nav-link nav-toggle" type="button" data-toggle-group="simulasi">
            <span class="nav-left">
              <span class="nav-icon">🧪</span>
              <span class="nav-text">Simulasi</span>
            </span>
            <span class="nav-caret">⌄</span>
          </button>

          <div class="submenu">
            <button class="submenu-link" type="button" data-page="simulasi-timeline">Timeline Pengadaan</button>
            <button class="submenu-link" type="button" data-page="simulasi-nontender">Pencatatan Non Tender</button>
            <button class="submenu-link" type="button" data-page="simulasi-procurement-stacker">Mini Game</button>
          </div>
        </div>

        <button class="nav-link" type="button" data-page="pemenang-pengadaan">
  <span class="nav-left">
    <span class="nav-icon">🏆</span>
    <span class="nav-text">Pemenang Pengadaan</span>
  </span>
</button>

        <div class="nav-group nav-group-internal" id="internalNavGroup" data-group="internal" hidden>
          <button class="nav-link nav-toggle" type="button" data-toggle-group="internal">
            <span class="nav-left">
              <span class="nav-icon">🔒</span>
              <span class="nav-text">Panel Internal</span>
            </span>
            <span class="nav-caret">⌄</span>
          </button>

          <div class="submenu">
            <button class="submenu-link submenu-link-internal" type="button" data-page="rapor-pbj-input-internal">Input Rapor PBJ</button>
            <button class="submenu-link submenu-link-internal" type="button" data-page="rapor-pbj-qc-internal">QC Rapor PBJ</button>
          </div>
        </div>
      </nav>

      <a
        class="sidebar-help-link"
        href="https://wa.me/628151667956?text=Halo%20admin%20UKPBJ%20Kota%20Bogor%2C%20saya%20ingin%20bertanya%20terkait%20penggunaan%20portal."
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="sidebar-help">
          <h3>Butuh Bantuan?</h3>
          <p>Hubungi admin/helpdesk untuk informasi penggunaan portal SIPPBJ.</p>
          <div class="help-button">Hubungi Helpdesk</div>
        </div>
      </a>
    </aside>

    <main class="content-area" id="contentArea"></main>
  </div>
  

  <div class="secret-login-overlay" id="secretLoginOverlay" aria-hidden="true">
    <div class="secret-login-modal">
      <div class="secret-login-kicker">AKSES INTERNAL</div>
      <h3>Panel Rapor PBJ</h3>
      <p>Menu internal hanya untuk pegawai/operator yang sudah diberi akses.</p>

      <form id="secretLoginForm" class="secret-login-form">
        <label>Username</label>
        <input type="text" id="secretUsername" autocomplete="username" placeholder="Masukkan username">

        <label>Password</label>
        <input type="password" id="secretPassword" autocomplete="current-password" placeholder="Masukkan password">

        <div class="secret-login-actions">
          <button type="submit" class="secret-login-submit">Masuk</button>
          <button type="button" class="secret-login-cancel" id="secretLoginCancel">Batal</button>
        </div>
      </form>

      <div class="secret-login-error" id="secretLoginError"></div>
    </div>
  </div>

  <div class="secret-login-toast" id="secretLoginToast">Mode internal aktif</div>
  
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
